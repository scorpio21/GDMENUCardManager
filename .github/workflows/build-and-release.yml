name: build-and-release

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión (ej. 2.0.5)'
        required: true
        default: '2.0.5'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            suffix: win-x64.zip
          - os: windows-latest
            rid: win-x86
            suffix: win-x86.zip
          - os: ubuntu-latest
            rid: linux-x64
            suffix: linux-x64.tar.gz
          - os: macos-latest
            rid: osx-x64
            suffix: osx-x64-AppBundle.tar.gz
          - os: macos-latest
            rid: osx-arm64
            suffix: osx-arm64-AppBundle.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determinar versión
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${github_ref#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version || '2.0.5' }}"
          fi
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Publish AvaloniaUI
        run: >
          dotnet publish src/GDMENUCardManager.AvaloniaUI/GDMENUCardManager.AvaloniaUI.csproj 
          -c Release 
          -r ${{ matrix.rid }} 
          --self-contained true 
          -p:PublishSingleFile=true 
          -p:PublishTrimmed=false 
          -o publish/${{ matrix.rid }}

      - name: Package Windows
        if: startsWith(matrix.rid, 'win-')
        shell: pwsh
        run: |
          $version = "${{ env.RELEASE_VERSION }}"
          Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath publish/GDMENUCardManager.v${version}-${{ matrix.suffix }}

      - name: Package Linux
        if: matrix.rid == 'linux-x64'
        run: |
          cd publish/${{ matrix.rid }}
          tar -czf ../GDMENUCardManager.v${{ env.RELEASE_VERSION }}-${{ matrix.suffix }} *

      - name: Package macOS
        if: startsWith(matrix.rid, 'osx-')
        run: |
          # Simular estructura de App Bundle simple para macOS
          mkdir -p "publish/GDMENUCardManager.app/Contents/MacOS"
          cp -r publish/${{ matrix.rid }}/* "publish/GDMENUCardManager.app/Contents/MacOS/"
          cd publish
          tar -czf GDMENUCardManager.v${{ env.RELEASE_VERSION }}-${{ matrix.suffix }} GDMENUCardManager.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: publish/GDMENUCardManager.v${{ env.RELEASE_VERSION }}-${{ matrix.suffix }}

  release:
    name: Create Release
    needs: build
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare publish folder for installer
        run: |
          mkdir publish
          # Usamos win-x64 para el instalador
          cp -r artifacts/win-x64/* publish/
          # InnoSetup espera win-x64-singlefile basado en installer.iss anterior, pero lo ajustaremos
          mkdir -p publish/win-x64-singlefile
          cp -r artifacts/win-x64/* publish/win-x64-singlefile/

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows Installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe" }
          $version = "${{ github.event.inputs.version || '2.0.5' }}"
          if ("${{ startsWith(github.ref, 'refs/tags/v') }}" -eq 'True') { $version = "${{ github.ref_name }}".Substring(1) }
          & $iscc "/DMyAppVersion=$version" "/Opublish" "installer.iss"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version || github.ref_name }}
          files: |
            artifacts/**/*
            publish/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
